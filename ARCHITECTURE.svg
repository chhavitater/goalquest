<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GoalQuest System Architecture</title>
  <desc>Three-tier architecture: React frontend, Node/Express API, PostgreSQL database</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── BROWSER TIER ─────────────────────────────────────────────── -->
  <g class="c-blue">
    <rect x="40" y="20" width="600" height="110" rx="14" stroke-width="0.5"/>
    <text class="th" x="340" y="46" text-anchor="middle">Browser — React 18 + Vite</text>
  </g>

  <!-- Employee view -->
  <g class="c-teal">
    <rect x="65" y="58" width="160" height="58" rx="8" stroke-width="0.5"/>
    <text class="th" x="145" y="83" text-anchor="middle">Employee View</text>
    <text class="ts" x="145" y="100" text-anchor="middle">Goals · Check-in · Summary</text>
  </g>

  <!-- Manager view -->
  <g class="c-purple">
    <rect x="260" y="58" width="160" height="58" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="83" text-anchor="middle">Manager View</text>
    <text class="ts" x="340" y="100" text-anchor="middle">Approvals · Team · Shared</text>
  </g>

  <!-- Admin view -->
  <g class="c-coral">
    <rect x="455" y="58" width="160" height="58" rx="8" stroke-width="0.5"/>
    <text class="th" x="535" y="83" text-anchor="middle">Admin View</text>
    <text class="ts" x="535" y="100" text-anchor="middle">Dashboard · CSV · Audit</text>
  </g>

  <!-- Arrow: Browser → API -->
  <line x1="340" y1="131" x2="340" y2="168" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>
  <text class="ts" x="356" y="153" text-anchor="start">REST JSON  /api/*</text>

  <!-- ── API TIER ────────────────────────────────────────────────────── -->
  <g class="c-gray">
    <rect x="40" y="170" width="600" height="185" rx="14" stroke-width="0.5"/>
    <text class="th" x="340" y="196" text-anchor="middle">Node.js / Express API  (port 4000)</text>
  </g>

  <!-- Middleware box -->
  <g class="c-amber">
    <rect x="65" y="210" width="200" height="58" rx="8" stroke-width="0.5"/>
    <text class="th" x="165" y="234" text-anchor="middle">Middleware</text>
    <text class="ts" x="165" y="251" text-anchor="middle">JWT auth · Role guard · Scoring</text>
  </g>

  <!-- Routes boxes — 4 across -->
  <g class="c-blue">
    <rect x="65" y="286" width="124" height="54" rx="8" stroke-width="0.5"/>
    <text class="th" x="127" y="309" text-anchor="middle">auth.js</text>
    <text class="ts" x="127" y="326" text-anchor="middle">Login · JWT</text>
  </g>

  <g class="c-teal">
    <rect x="205" y="286" width="124" height="54" rx="8" stroke-width="0.5"/>
    <text class="th" x="267" y="309" text-anchor="middle">goals.js</text>
    <text class="ts" x="267" y="326" text-anchor="middle">CRUD · Approve · Shared</text>
  </g>

  <g class="c-purple">
    <rect x="345" y="286" width="138" height="54" rx="8" stroke-width="0.5"/>
    <text class="th" x="414" y="309" text-anchor="middle">achievements.js</text>
    <text class="ts" x="414" y="326" text-anchor="middle">Check-in · Scores</text>
  </g>

  <g class="c-coral">
    <rect x="499" y="286" width="124" height="54" rx="8" stroke-width="0.5"/>
    <text class="th" x="561" y="309" text-anchor="middle">reports.js</text>
    <text class="ts" x="561" y="326" text-anchor="middle">Dashboard · CSV · Audit</text>
  </g>

  <!-- Arrow: API → DB -->
  <line x1="340" y1="356" x2="340" y2="392" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>
  <text class="ts" x="356" y="377" text-anchor="start">pg (node-postgres)</text>

  <!-- ── DATABASE TIER ─────────────────────────────────────────────── -->
  <g class="c-green">
    <rect x="40" y="394" width="600" height="104" rx="14" stroke-width="0.5"/>
    <text class="th" x="340" y="420" text-anchor="middle">PostgreSQL  (port 5432)</text>
  </g>

  <!-- Table pills -->
  <g class="c-teal">
    <rect x="65"  y="434" width="84" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="107" y="455" text-anchor="middle">users</text>
    <text class="ts" x="107" y="472" text-anchor="middle">role · mgr</text>
  </g>
  <g class="c-teal">
    <rect x="163" y="434" width="84" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="205" y="455" text-anchor="middle">cycles</text>
    <text class="ts" x="205" y="472" text-anchor="middle">year · qtr</text>
  </g>
  <g class="c-teal">
    <rect x="261" y="434" width="84" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="303" y="455" text-anchor="middle">goals</text>
    <text class="ts" x="303" y="472" text-anchor="middle">uom · status</text>
  </g>
  <g class="c-teal">
    <rect x="359" y="434" width="104" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="411" y="455" text-anchor="middle">achievements</text>
    <text class="ts" x="411" y="472" text-anchor="middle">qtr · actual</text>
  </g>
  <g class="c-teal">
    <rect x="477" y="434" width="90" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="522" y="455" text-anchor="middle">audit_log</text>
    <text class="ts" x="522" y="472" text-anchor="middle">JSONB details</text>
  </g>
</svg>
